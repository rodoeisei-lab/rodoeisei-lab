<!doctype html>
<html lang="ja">
<head>
  {% include head.html %}
</head>
<body{% if page.layout == 'home' %} class="home-page"{% endif %}>
  {% include site-header.html %}
  <main id="main">
    {{ content }}
  </main>
  <section class="ask-banner" aria-label="質問導線">
    <p>現場の悩みを匿名で相談できます</p>
    <a href="{{ "/qa/ask/" | relative_url }}" class="btn-question">質問する</a>
  </section>
  {% include site-footer.html %}
  <a href="{{ "/qa/ask/" | relative_url }}" class="cta-consult-fixed" aria-label="匿名で相談する（匿名OK）" title="匿名OKで相談を投稿できます">
    <span class="cta-consult-fixed__label">匿名で相談する</span>
    <span class="cta-consult-fixed__meta" aria-hidden="true">匿名OK</span>
  </a>
  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
</body>
</html>
