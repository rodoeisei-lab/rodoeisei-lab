name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Optimize images
        run: python3 scripts/assets/optimize_images.py

      - name: Build site
        run: bundle exec jekyll build

      - name: Build Pagefind index
        run: |
          if ! npx -y pagefind --config pagefind.yml; then
            echo "Pagefind indexing failed; continuing with an empty placeholder so Pages can deploy." >&2
            mkdir -p _site/pagefind
            printf 'console.warn("Pagefind index was not generated during this deploy.");\n' > _site/pagefind/pagefind.js
          fi

      - name: Verify Pagefind output
        run: test -d _site/pagefind

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
